[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "protocol-auditor"
version = "0.1.0"
description = "Network protocol security audit orchestrator using claude-code-sdk"
requires-python = ">=3.11"
dependencies = [
    "claude-code-sdk",
]

[project.scripts]
protocol-auditor = "protocol_auditor.main:main"

[tool.hatch.build.targets.wheel]
packages = ["protocol_auditor"]
